services:
  hazelcast1:
    image: hazelcast/hazelcast:5.6.0
    ports:
      - "5701:5701"
    volumes:
      - ./hazelcast.yaml:/opt/hazelcast/hazelcast.yaml
    environment:
      - HZ_NETWORK_JOIN_MULTICAST_ENABLED=true
      - HZ_MEMBER_NAMING_CLIENT_ID=hz1

  hazelcast2:
    image: hazelcast/hazelcast:5.6.0
    ports:
      - "5702:5701"
    volumes:
      - ./hazelcast.yaml:/opt/hazelcast/hazelcast.yaml
    environment:
      - HZ_NETWORK_JOIN_MULTICAST_ENABLED=true
      - HZ_MEMBER_NAMING_CLIENT_ID=hz2

  hazelcast3:
    image: hazelcast/hazelcast:5.6.0
    ports:
      - "5703:5701"
    volumes:
      - ./hazelcast.yaml:/opt/hazelcast/hazelcast.yaml
    environment:
      - HZ_NETWORK_JOIN_MULTICAST_ENABLED=true
      - HZ_MEMBER_NAMING_CLIENT_ID=hz3

  management-center:
    image: hazelcast/management-center:5.6.0
    ports:
      - "8080:8080"
    depends_on:
      - hazelcast1
      - hazelcast2
      - hazelcast3
    environment:
      - MC_DEFAULT_CLUSTER=dev
      - MC_DEFAULT_CLUSTER_MEMBERS=hazelcast1:5701,hazelcast2:5701,hazelcast3:5701